# =============================================================================
# 📊 PROMETHEUS CONFIGURATION — STORESGO BACKEND
# Metrics collection and alerting configuration
# =============================================================================

global:
  scrape_interval: 15s          # How often to scrape targets
  evaluation_interval: 15s       # How often to evaluate rules
  scrape_timeout: 10s

  # Attach labels to all metrics
  external_labels:
    monitor: 'storesgo-monitor'
    environment: 'production'

# =============================================================================
# Alertmanager configuration
# =============================================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# =============================================================================
# Rule files for alerting
# =============================================================================
rule_files:
  - /etc/prometheus/alert.rules.yml

# =============================================================================
# Scrape configurations
# =============================================================================
scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ---------------------------------------------------------------------------
  # StoresGo Backend API
  # ---------------------------------------------------------------------------
  - job_name: 'storesgo-api'
    static_configs:
      - targets: ['api:5000']
        labels:
          service: 'storesgo-backend'
          tier: 'api'
    metrics_path: /api/metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # ---------------------------------------------------------------------------
  # Node Exporter (Host metrics)
  # ---------------------------------------------------------------------------
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node'
          tier: 'infrastructure'

  # ---------------------------------------------------------------------------
  # PostgreSQL Exporter
  # ---------------------------------------------------------------------------
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          tier: 'database'

  # ---------------------------------------------------------------------------
  # Redis Exporter
  # ---------------------------------------------------------------------------
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          tier: 'cache'

  # ---------------------------------------------------------------------------
  # Docker containers (via cAdvisor)
  # ---------------------------------------------------------------------------
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          tier: 'infrastructure'

