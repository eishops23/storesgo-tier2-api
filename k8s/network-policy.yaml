# =============================================================================
# 🔒 KUBERNETES NETWORK POLICY — STORESGO BACKEND
# Restricts network traffic to/from the backend pods
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: storesgo-backend-network-policy
  namespace: storesgo-prod
  labels:
    app.kubernetes.io/name: storesgo-backend
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: storesgo-backend
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    # Allow traffic from Ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5000
    
    # Allow traffic from Prometheus for metrics scraping
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 5000
    
    # Allow internal communication between backend pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: storesgo-backend
      ports:
        - protocol: TCP
          port: 5000
  
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # Allow PostgreSQL connections
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8  # Adjust to your VCN CIDR
      ports:
        - protocol: TCP
          port: 5432
    
    # Allow Redis connections
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8  # Adjust to your VCN CIDR
      ports:
        - protocol: TCP
          port: 6379
    
    # Allow HTTPS for external APIs (OpenAI, Sentry, etc.)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    
    # Allow SMTP for email notifications
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 587
        - protocol: TCP
          port: 465

