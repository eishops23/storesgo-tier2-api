# =============================================================================
# 🚀 KUBERNETES DEPLOYMENT — STORESGO BACKEND
# Production deployment configuration for OKE (Oracle Container Engine)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storesgo-backend
  namespace: storesgo-prod
  labels:
    app.kubernetes.io/name: storesgo-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: storesgo-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: storesgo-backend
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: storesgo-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      
      # Anti-affinity to spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: storesgo-backend
                topologyKey: kubernetes.io/hostname

      containers:
        - name: storesgo-backend
          image: ghcr.io/your-org/storesgo-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          
          # Environment variables from ConfigMap
          envFrom:
            - configMapRef:
                name: storesgo-backend-config
            - secretRef:
                name: storesgo-backend-secrets
          
          # Resource limits and requests
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          
          # Liveness probe - restart if not responding
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe - remove from service if not ready
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          # Startup probe - allow time for initial startup
          startupProbe:
            httpGet:
              path: /api/health/startup
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          
          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
            - name: uploads
              mountPath: /app/uploads
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: uploads
          persistentVolumeClaim:
            claimName: storesgo-uploads-pvc

      # Graceful termination
      terminationGracePeriodSeconds: 30
      
      # Image pull secrets (if using private registry)
      imagePullSecrets:
        - name: ghcr-secret
---
# =============================================================================
# 📦 PERSISTENT VOLUME CLAIM — UPLOADS
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storesgo-uploads-pvc
  namespace: storesgo-prod
  labels:
    app.kubernetes.io/name: storesgo-backend
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: oci-fss
  resources:
    requests:
      storage: 50Gi
---
# =============================================================================
# 👤 SERVICE ACCOUNT
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: storesgo-backend
  namespace: storesgo-prod
  labels:
    app.kubernetes.io/name: storesgo-backend

