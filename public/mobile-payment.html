<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>StoresGo Payment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#F5F5F5;min-height:100vh}
.container{max-width:500px;margin:0 auto;padding:20px}
.amount-display{text-align:center;padding:24px 0;background:#fff;border-radius:12px;margin-bottom:16px}
.amount-label{color:#666;font-size:14px;margin-bottom:4px}
.amount-value{color:#00C46F;font-size:32px;font-weight:700}
.card-container{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px}
.field-label{font-size:14px;color:#333;margin-bottom:8px;font-weight:500}
#card-container{min-height:50px}
.save-card-container{display:flex;align-items:flex-start;gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid #E5E5E5}
.save-card-checkbox{width:20px;height:20px;margin-top:2px;accent-color:#00C46F}
.save-card-label{font-size:14px;color:#333;cursor:pointer}
.save-card-hint{font-size:12px;color:#888;margin-top:2px}
.pay-button{width:100%;background:#00C46F;color:#fff;border:none;border-radius:12px;padding:16px;font-size:18px;font-weight:600;cursor:pointer}
.pay-button:disabled{background:#ccc}
.cancel-button{width:100%;background:transparent;color:#666;border:none;padding:16px;font-size:16px;cursor:pointer;margin-top:8px}
.error-message{color:#E53935;font-size:14px;margin-top:12px;padding:12px;background:#FFEBEE;border-radius:8px;display:none}
.secure-badge{display:flex;align-items:center;justify-content:center;margin-top:20px;color:#666;font-size:12px}
.loading{text-align:center;padding:40px;color:#666}
.spinner{border:3px solid #f3f3f3;border-top:3px solid #00C46F;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
<div class="amount-display">
<div class="amount-label">Total Amount</div>
<div class="amount-value" id="amount-display">$0.00</div>
</div>
<div id="loading-state" class="loading">
<div class="spinner"></div>
<div>Loading secure payment form...</div>
</div>
<div id="card-form" style="display:none">
<div class="card-container">
<div class="field-label">Card Details</div>
<div id="card-container"></div>
<div id="error-message" class="error-message"></div>
<div id="save-card-section" class="save-card-container" style="display:none">
<input type="checkbox" id="save-card" class="save-card-checkbox">
<div>
<label for="save-card" class="save-card-label">Save card for future purchases</label>
<div class="save-card-hint">Your card info is securely stored by Square</div>
</div>
</div>
</div>
<button id="pay-button" class="pay-button" disabled>Pay</button>
<button id="cancel-button" class="cancel-button">Cancel</button>
<div class="secure-badge">🔒 Secured by Square</div>
</div>
</div>
<script src="https://web.squarecdn.com/v1/square.js"></script>
<script>
const SQUARE_APP_ID = "sq0idp-IKD5NxWM_cZvWup2CyOh6g";
const SQUARE_LOCATION_ID = "LY21SKJ50YSBK";
const params = new URLSearchParams(window.location.search);
const amount = parseFloat(params.get("amount")) || 0;
const authToken = params.get("token") || "";
const isLoggedIn = !!authToken;
document.getElementById("amount-display").textContent = "$" + amount.toFixed(2);
if (isLoggedIn) {
  document.getElementById("save-card-section").style.display = "flex";
}
function postMessage(data) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify(data));
  }
  console.log("postMessage:", data);
}
let card;
let payments;
async function initializeSquare() {
  if (typeof Square === "undefined") {
    postMessage({ type: "ERROR", message: "Square SDK failed to load." });
    return;
  }
  try {
    payments = Square.payments(SQUARE_APP_ID, SQUARE_LOCATION_ID);
    card = await payments.card();
    await card.attach("#card-container");
    document.getElementById("loading-state").style.display = "none";
    document.getElementById("card-form").style.display = "block";
    document.getElementById("pay-button").disabled = false;
    document.getElementById("pay-button").textContent = "Pay $" + amount.toFixed(2);
    postMessage({ type: "READY" });
  } catch (e) {
    postMessage({ type: "ERROR", message: "Failed to initialize: " + e.message });
  }
}
document.getElementById("pay-button").addEventListener("click", async () => {
  const btn = document.getElementById("pay-button");
  const errorEl = document.getElementById("error-message");
  const saveCard = document.getElementById("save-card").checked;
  btn.disabled = true;
  btn.textContent = "Processing...";
  errorEl.style.display = "none";
  try {
    const result = await card.tokenize();
    if (result.status === "OK") {
      let verificationToken = null;
      
      // If saving card, get verification token using verifyBuyer
      if (saveCard && authToken && payments) {
        try {
          btn.textContent = "Verifying card...";
          console.log("Calling verifyBuyer for card saving...");
        const verifyPromise = payments.verifyBuyer(result.token, {
          amount: amount.toFixed(2),
          currencyCode: "USD",
          intent: "CHARGE"
        });
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Verification timeout")), 5000));
        const verifyResult = await Promise.race([verifyPromise, timeoutPromise]);
          if (verifyResult && verifyResult.token) {
            verificationToken = verifyResult.token;
            console.log("Verification token obtained successfully");
          } else {
            console.warn("verifyBuyer did not return a token");
          }
        } catch (verifyErr) {
          console.error("verifyBuyer error:", verifyErr);
          // Continue without verification token - payment will work but card won't be saved
        }
      }
      
      postMessage({
        type: "TOKEN",
        token: result.token,
        verificationToken: verificationToken,
        saveCard: saveCard,
        authToken: authToken
      });
    } else {
      let msg = result.errors && result.errors.length > 0
        ? result.errors.map(e => e.message).join(", ")
        : "Invalid card details";
      errorEl.textContent = msg;
      errorEl.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Pay $" + amount.toFixed(2);
    }
  } catch (err) {
    errorEl.textContent = "Payment failed: " + (err.message || "Unknown error");
    errorEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Pay $" + amount.toFixed(2);
  }
});
document.getElementById("cancel-button").addEventListener("click", () => {
  postMessage({ type: "CANCEL" });
});
setTimeout(initializeSquare, 300);
</script>
</body>
</html>
